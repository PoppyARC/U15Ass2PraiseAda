<div class="container py-5">

    <h1 class="text-center text-white mb-1">
        Join Pulse VR
    </h1>

    <p class="text-center text-light mb-5">
        Choose your membership plan and start your virtual reality adventure today.
    </p>


    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card bg-dark text-white shadow p-4">

                <form>


                    <div class="mb-3">
                        <label class="form-label">
                            Full Name
                        </label>

                        <input 
                        type="text" 
                        class="form-control"
                        placeholder="Enter your name">
                    </div>



                    <div class="mb-3">
                        <label class="form-label">
                            Email Address
                        </label>

                        <input 
                        type="email" 
                        class="form-control"
                        placeholder="Enter your email">
                    </div>



                    <div class="mb-3">
                        <label class="form-label">
                            Phone Number
                        </label>

                        <input 
                        type="tel" 
                        class="form-control"
                        placeholder="Enter your phone number">
                    </div>



                    <div class="mb-3">
                        <label class="form-label">
                            Select Membership
                        </label>


                        <select class="form-select">

                            <option>
                                Basic VR - $15/month
                            </option>

                            <option>
                                Premium VR - $30/month
                            </option>

                            <option>
                                Unlimited VR - $50/month
                            </option>

                        </select>

                    </div>



                    <div class="mb-3">

                        <label class="form-label">
                            Preferred Gaming Time
                        </label>


                        <select class="form-select">

                            <option>
                                Morning
                            </option>

                            <option>
                                Afternoon
                            </option>

                            <option>
                                Evening
                            </option>

                        </select>

                    </div>



                    <div class="mb-3">

                        <label class="form-label">
                            Message
                        </label>


                        <textarea 
                        class="form-control"
                        rows="4"
                        placeholder="Any questions or requests?"></textarea>

                    </div>



                    <button class="btn btn-danger w-100">
                        Create Membership
                    </button>


                </form>


            </div>

        </div>

    </div>


</div>
